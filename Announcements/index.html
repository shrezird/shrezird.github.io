<!DOCTYPE html>
<html>
<head>
    <title>Shrezird Games: Announcements</title>
    <link rel="icon" href="../Assets/Icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('../Assets/Background.png');
            background-size: cover;
            height: 100vh;
            margin: 0;
            font-family: 'Baloo 2', cursive;
        }
        h1 {
            color: rgb(0, 0, 0);
            font-size: 2em;
            margin: 0;
            padding: 0 10px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            position: fixed;
            left: 5px;
        }
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: fixed;
            right: 20px;
            top: 10px;
        }
        .header div {
            color: rgb(0, 0, 0);
            font-size: 1.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            margin-left: 20px;
            transition: color 0.5s ease, transform 0.5s ease;
        }
        .header div:hover {
            color: rgb(248, 248, 248);
            transform: scale(1.05);
        }
        .header a {
            text-decoration: none;
        }

        .header a:hover div {
            transform: scale(1.05);
        }

        .header a[href='./'] div {
            color: rgb(248, 248, 248);
        }
        footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }
        footer p {
            color: rgb(0, 0, 0);
            font-size: 1.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
        .discord-icon {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            transition: transform 0.3s ease;
        }
        .discord-icon:hover {
            transform: scale(1.1);
        }
    </style>
    <script>
        window.onload = function() {
            fetch('../Assets/Message.txt')
                .then(response => response.text())
                .then(data => {
                    var messages = data.split('\n');
                    var randomMessage = messages[Math.floor(Math.random() * messages.length)];
                    document.getElementById('message').innerText = randomMessage;
                })
        }
    </script>
</head>
<body>
    <h1>Shrezird Games</h1>
    <div class="header">
        <a href='../Projects/'><div>Projects</div></a>
        <a href='../Updates/'><div>Updates</div></a>
        <a href='./'><div>Announcements</div></a>
        <a href='../About/'><div>About</div></a>
    </div>
    <h1 style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 5em; text-align: center;">404</h1>
    <p style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; text-align: center;">there was an error displaying page content at this time</p>
    <footer>
        <p id="message"></p>
        <p>© 2024 Shrezird Games. All rights reserved.</p>
        <a href="https://discord.gg/metDqzKRZe" target="_blank">
            <img src="../Assets/Discord.png" alt="Discord" class="discord-icon">
        </a>
    </footer>
</body>
</html>
