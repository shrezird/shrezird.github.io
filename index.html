<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('Background.png');
            background-size: cover;
            height: 100vh;
            margin: 0;
            font-family: 'Baloo 2', cursive;
        }
        h1 {
            color: rgb(0, 0, 0);
            font-size: 2em;
            margin: 0;
            padding: 0 10px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            position: fixed;
            left: 5px;
        }
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: fixed;
            right: 20px;
            top: 10px;
        }
        .header div {
            color: rgb(0, 0, 0);
            font-size: 1.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            margin-left: 20px;
            transition: color 0.5s ease, transform 0.5s ease;
        }
        .header div:hover {
            color: rgb(90, 20, 130);
            transform: scale(1.05);
        }
        .header a {
            text-decoration: none;
        }

        .header a:hover div {
            transform: scale(1.05);
        }

        .header a[href='index.html'] div {
            color: rgb(90, 20, 130);
        }
        footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }
        footer p {
            color: rgb(0, 0, 0);
            font-size: 1.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
    </style>
