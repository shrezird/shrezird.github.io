<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet');

        body {
            margin: 0;
            padding: 0;
            background: url('Background.png') no-repeat center center fixed; 
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            transition: transform .2s;
            transform-origin: center;
            font-family: "Gloria Hallelujah", cursive;
        }
        .container {
            position: relative;
            width: 50%;
            height: 75vh;
            margin: 10vh auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 10px;
            color: white;
            transition: transform .2s, opacity .2s, box-shadow .2s;
            opacity: 0.9;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        .container:hover {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.7);
        }
        .profile-pic {
            position: absolute;
            top: -50px;
            left: calc(50% - 50px);
            width: 100px;
            height: 100px;
            background: url('Profile.png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            border: 2px solid rgb(0, 0, 0);
        }
        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }
        .social-links a {
            color: rgb(0, 204, 255);
            text-decoration: none;
        }
    </style>
    <script>
        document.addEventListener('mousemove', function(e) {
            const body = document.querySelector('body');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const offsetX = e.clientX - centerX;
            const offsetY = e.clientY - centerY;
            const dx = offsetX / centerX;
            const dy = offsetY / centerY;
            const rotateX = dy * 10;
            const rotateY = dx * -10;
            body.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="profile-pic"></div>
        <div class="social-links">
            <a href="https://www.youtube.com/channel/UCuD995AXGS5_TRuXttkMCOw">youtube</a>
            <a href="https://www.tiktok.com/@shrezird">tiktok</a>
            <a href="https://www.twitch.tv/shrezird">twitch</a>
            <a href="https://discord.com/invite/AgPGYxrHjW">discord</a>
            <a href="https://twitter.com/i/flow/login?redirect_after_login=%2Fshrezird">twitter</a>
            <a href="https://www.instagram.com/shrezird">instagram</a>
            <a href="https://shrezird.itch.io/">itch.io</a>
            <a href="https://www.roblox.com/users/5470730462/profile">roblox</a>
        </div>
        <style>
    
            h1 {
                margin-bottom: 0;
            }
    
            p {
                margin-top: 0;
                text-align: center;
            }
        </style>
        <h1>hey there!</h1>
        <p>welcome to my tiny website! not much to see here to be honest. maybe i'll add more things in the future when i actually have things to add...</p>
    </div>
</body>
</html>
